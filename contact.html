    <main>
        <section class="contact-section">
            <h2>Contact Me</h2>
            <p>Have a project in mind or just want to say hi? Feel free to send a message!</p>

            <form action="https://formspree.io/f/xaqlzywj" method="POST" class="contact-form">
                
                <div class="form-group">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" placeholder="Your Name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="_replyto" placeholder="Your Email" required>
                </div>

                <div class="form-group">
                    <label for="message">Message:</label>
                    <textarea id="message" name="message" rows="5" placeholder="How can I help you?" required></textarea>
                </div>

                <button type="submit" class="btn">Send Message</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Braden Dudley | Built with passion.</p>
    </footer>
